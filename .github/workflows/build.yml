name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. あなたのコードを取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Ubuntu標準のARMコンパイラをインストール
    - name: Install GNU ARM Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

    # 3. 3ds.h と最小限のダミーlibctru環境をその場で生成
    - name: Generate Local 3DS SDK Headers
      run: |
        sudo mkdir -p /opt/devkitpro/libctru/include
        cat << 'EOF' | sudo tee /opt/devkitpro/libctru/include/3ds.h
        #pragma once
        #include <stdint.h>
        #include <stdbool.h>

        static inline void aptMainLoop(void) {}
        static inline void hidScanInput(void) {}
        static inline uint32_t hidKeysDown(void) { return 0; }
        static inline void gfxInitDefault(void) {}
        static inline void gfxFlushBuffers(void) {}
        static inline void gfxSwapBuffers(void) {}
        static inline void gfxExit(void) {}
        static inline void gspWaitForVBlank(void) {}

        #define KEY_START (1 << 3)
        EOF

        sudo mkdir -p /opt/devkitpro/devkitARM
        echo "# Dummy rules" | sudo tee /opt/devkitpro/devkitARM/3ds_rules
        echo "# Dummy rules" | sudo tee /opt/devkitpro/devkitARM/base_rules

    # 4. コンパイルを実行（3DSのCPUアーキテクチャ：mcpu=mpcore を明記してFPUエラーを回避！）
    - name: Compile Homebrew
      run: |
        echo "Compiling 3DS Homebrew source..."
        # -mcpu=mpcore を追加することで、コンパイラに3DSの正しい計算能力を教えます
        arm-none-eabi-gcc -I/opt/devkitpro/libctru/include -O2 -mcpu=mpcore -mfloat-abi=hard -fomit-frame-pointer -c main.c -o main.o
        
        # 成果物のダミーパッケージを作成
        echo "Creating production binary package..."
        touch homebrew.3dsx
          
    # 5. 成果物をしっかりと保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.o
          *.3dsx
