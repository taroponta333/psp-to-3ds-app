name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      PATH: /opt/devkitpro/devkitARM/bin:/opt/devkitpro/tools/bin:/opt/devkitpro/pacman/bin:/usr/local/bin:/usr/bin:/bin

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install 3DS Dev Kit
      run: |
        /opt/devkitpro/pacman/bin/pacman -Sy --noconfirm 3ds-dev

    - name: Compile and Link Manually
      run: |
        # 1. main.c を 3DSのCPU（ARMv6k）用として正しくコンパイル
        arm-none-eabi-gcc -march=armv6k -mtune=mpcore -mfloat-abi=hard -mtp=soft -O2 -I/opt/devkitpro/libctru/include -D__3DS__ -c main.c -o main.o
        
        # 2. 3DSの標準ライブラリ（libctru）をガッチリ結合して中密度のバイナリ（elf）を作成
        arm-none-eabi-gcc -specs=3dsx.specs -march=armv6k -mtune=mpcore -mfloat-abi=hard -mtp=soft main.o -L/opt/devkitpro/libctru/lib -lctru -lm -o 3ds_to_psp_sender.elf
        
        # 3. 最終的な3DSのホームブリュー形式（.3dsx）に変換！
        3dsxtool 3ds_to_psp_sender.elf 3ds_to_psp_sender.3dsx

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
