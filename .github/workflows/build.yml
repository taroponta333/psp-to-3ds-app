name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. あなたのコード（main.c, Makefile）を取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 【ここを修正！】gnupgをすべて小文字に直しました
    - name: Add devkitPro repository
      run: |
        sudo apt-get update
        sudo apt-get install -y gnupg wget
        # devkitProの公開鍵を登録
        sudo wget -O /usr/share/keyrings/devkitpro-keyring.gpg https://pkg.devkitpro.org/devkitpro-keyring.gpg
        # リポジトリ一覧にdevkitProを追加
        echo "deb [signed-by=/usr/share/keyrings/devkitpro-keyring.gpg] https://pkg.devkitpro.org/debian devkitpro main" | sudo tee /etc/apt/sources.list.d/devkitpro.list

    # 3. 3DS開発に必要なツール（devkitARM）を直接インストールする
    - name: Install devkitARM and libctru
      run: |
        sudo apt-get update
        # 3ds用のコンパイラとライブラリ一式を直接叩き込む
        sudo apt-get install -y devkitarm-rules 3ds-dev

    # 4. コンパイルを実行
    - name: Compile Homebrew
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        make
          
    # 5. 出来上がった成果物（.3dsx）を保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
