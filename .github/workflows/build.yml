name: 3DS Homebrew Ultimate Real Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile Real Homebrew
      run: |
        # 1. 環境変数の設定
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
        
        # 2. 3DS開発セットをインストール
        /opt/devkitpro/pacman/bin/pacman -Sy --noconfirm 3ds-dev
        
        # 3. 本番コンパイル！
        # CFLAGSにインクルードパスを強制注入して、3ds.hを絶対に見つけさせます
        make clean
        make CFLAGS="-I/opt/devkitpro/libctru/include"

    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
