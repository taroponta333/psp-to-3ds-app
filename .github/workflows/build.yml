name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      # 【修正】末尾に /opt/devkitpro/pacman/bin を追加して、pacmanの居場所を教えました！
      PATH: /opt/devkitpro/devkitARM/bin:/opt/devkitpro/tools/bin:/opt/devkitpro/pacman/bin:/usr/local/bin:/usr/bin:/bin

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install 3DS Dev Kit
      run: |
        # フルパスで確実に呼び出します
        /opt/devkitpro/pacman/bin/pacman -Sy --noconfirm 3ds-dev

    - name: Compile
      run: |
        make clean
        # ジョブ全体に DEVKITPRO がガッチリ効いているので、これでリンクエラーも消えるはずです
        make CFLAGS="-I/opt/devkitpro/libctru/include" LDFLAGS="-L/opt/devkitpro/libctru/lib"

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
