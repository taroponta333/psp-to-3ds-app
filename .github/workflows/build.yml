name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
    
    # ここで環境変数を定義すれば、pacmanもmakeも確実にパスを認識します
    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      PATH: /opt/devkitpro/devkitARM/bin:/opt/devkitpro/tools/bin:/usr/local/bin:/usr/bin:/bin

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install 3DS Dev Kit
      # 403が出た場合は「サーバーの機嫌が悪い」です。
      # この構成が最も成功率が高いです。
      run: |
        pacman -Sy --noconfirm 3ds-dev

    - name: Compile
      run: |
        make clean
        # Makefileが環境変数を読み込まない場合でも、以下で強制的にパスを渡します
        make CFLAGS="-I/opt/devkitpro/libctru/include" LDFLAGS="-L/opt/devkitpro/libctru/lib"

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
