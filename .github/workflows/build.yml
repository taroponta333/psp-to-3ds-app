name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 【超重要】コンパイラだけでなく、3ds.h や libctru が最初から「全部入り」の公式イメージを指定
    container:
      image: devkitpro/devkitpro:latest

    steps:
    # 1. あなたのコードを取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 通信を一切行わず、コンテナ内のローカルファイルだけで一発コンパイル！
    - name: Compile Homebrew
      run: |
        # 全部入りコンテナの内部パスを完璧に案内
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
        
        make
          
    # 3. 出来上がった成果物を保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
