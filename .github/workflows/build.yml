name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 【ここを修正！】3DS開発用のライブラリ(libctru等)が最初から全部入っているコンテナを指定
    container:
      image: cyberic/devkitpro-3ds:latest

    steps:
    # 1. あなたのコードを取得する
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 最初から3ds.hが入っているので、そのまま一発コンパイル！
    - name: Compile Homebrew
      run: |
        make
          
    # 3. 出来上がった成果物を保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
