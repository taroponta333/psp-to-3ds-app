name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 外部のアクションを探しに行かず、このジョブ自体を全部入りの環境で直接実行する
    container:
      image: devkitpro/devkitarm:latest

    steps:
    # 1. あなたのコードを取得する
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. サーバーから何もダウンロードせず、カバンの中にあるツールで直接コンパイル
    # (コンテナを直接指定しているので、すでに3ds.hの場所も自動で繋がっています)
    - name: Compile Homebrew
      run: |
        make
          
    # 3. 出来上がった成果物を保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
