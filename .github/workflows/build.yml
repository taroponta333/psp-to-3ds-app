name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 【最終解答】3DS開発環境(devkitARM + 3ds-dev)が最初から100%全て入っている公式コンテナを直接指定
    container:
      image: devkitpro/devkitarm:latest

    steps:
    # 1. あなたのコード（main.c, Makefile）を取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 外部へのダウンロードは一切不要！目の前にあるツールで直接一発コンパイル！
    - name: Compile Homebrew
      run: |
        # コンテナ内の公式パスをガチッと繋ぐ
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export PATH=$DEVKITARM/bin:$PATH
        
        make
          
    # 3. 出来上がった成果物（.3dsx）を保存してダウンロード可能にする
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
