name: 3DS Homebrew Ultimate Real Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 【ここが唯一にして最大の修正！】
    # ghcr.io（GitHubの倉庫）ではなく、Docker Hub（標準倉庫）から引っ張るのが正解でした！
    container:
      image: devkitpro/devkitarm:latest

    steps:
    # 1. あなたのコードを取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 最初から入っている本物のコンパイラと3dsxtoolを使ってビルド！
    - name: Compile Real Homebrew
      run: |
        # コンテナ内に最初から完璧に整っている本物のパスを指定
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
        
        # あなたの Makefile を使って、本物の 3dsxtool を経由したビルドを実行
        make clean
        make

    # 3. 今度こそ、0バイトじゃない本物の3dsxファイルを保存！
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
