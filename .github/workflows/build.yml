name: 3DS Homebrew Ultimate Real Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # 【ここが最強の修正！】
    # devkitarm（空の器）ではなく、3ds環境全部入りのイメージを直接指定！
    container:
      image: devkitpro/3ds:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile Real Homebrew
      run: |
        # パス設定（このイメージなら最初からここにあるはず！）
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
        
        # もう pacman を叩かない！ダウンロードによる403エラーを回避！
        # そのままメイクするだけ！
        make clean
        make

    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
