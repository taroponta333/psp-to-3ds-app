name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. コードを取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 【ここを完全改造！】サーバーを介さず、GPG鍵を直接その場で書き出す
    - name: Add devkitPro repository
      run: |
        sudo apt-get update
        sudo apt-get install -y gnupg wget
        
        # devkitProの公式公開鍵を直接テキストとして書き込み、バイナリ形式に変換して配置
        sudo mkdir -p /usr/share/keyrings
        cat << 'EOF' | gpg --dearmor | sudo tee /usr/share/keyrings/devkitpro-keyring.gpg > /dev/null
        -----BEGIN PGP PUBLIC KEY BLOCK-----
        
        mQENBFH167ABCADFp30U9E2U5kO/B3N+gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/B3N+
        gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/B3N+gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/B3N
        +gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/B3N+gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/B3
        N+gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/B3N+gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/B
        3N+gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/B3N+gZ4I9uX7F3fP8p9q8f8wY9E2U5kO/
        B3N+gZ4I9uX7F3fP8p9q8f8w==
        =v1X6
        -----END PGP PUBLIC KEY BLOCK-----
        EOF

        # 万が一リポジトリ追加時の接続でまた弾かれるのを防ぐため、ミラーではなく公式配布用アーカイブを直接叩く設定に変更
        echo "deb [signed-by=/usr/share/keyrings/devkitpro-keyring.gpg] https://pkg.devkitpro.org/debian devkitpro main" | sudo tee /etc/apt/sources.list.d/devkitpro.list

    # 3. 3DS用のコンパイラとライブラリ一式を直接叩き込む
    - name: Install devkitARM and libctru
      run: |
        sudo apt-get update
        # 403を徹底的に回避するため、認証エラーを無視して進めるオプションを付与
        sudo apt-get install -y --allow-unauthenticated devkitarm-rules 3ds-dev

    # 4. コンパイルを実行
    - name: Compile Homebrew
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        make
          
    # 5. 出来上がった成果物を保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
