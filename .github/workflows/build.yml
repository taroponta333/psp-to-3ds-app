name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # devkitpro公式が現在推奨している、3DS用の環境が最初から「全部入り」のコンテナを指定
    container:
      image: devkitpro/devkitarm:latest

    steps:
    # 1. あなたのコードを取得する
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 最初から3ds.hやlibctruが入っているので、ネットワークを介さずそのままコンパイル！
    - name: Compile Homebrew
      run: |
        # コンテナ内の正しいパスを Makefile に教えてあげる
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        make
          
    # 3. 出来上がった成果物を保存してダウンロード可能にする
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
