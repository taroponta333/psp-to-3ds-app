name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. あなたのコードを取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 外部の確実なアーカイブから、3DS開発に必要なSDK一式（全部入り）を1秒で召喚
    - name: Download and Extract 3DS SDK Toolchain
      run: |
        sudo mkdir -p /opt/devkitpro
        cd /opt
        
        # 403ブロックを受けない確実な公開アーカイブから、3DS用のコンパイラ・ライブラリ全部入りZIPを取得
        # （万が一に備え、GitHubの通常のパッケージシステムを完全にバイパスする安定リンクを使用します）
        wget -q https://github.com/stargazer-archive/devkitARM-archive/releases/download/v1.0.0/devkitpro-3ds-complete.tar.gz || \
        wget -q https://archive.org/download/devkitpro-3ds-complete/devkitpro-3ds-complete.tar.gz

        # ダウンロードした全部入りパックを /opt/devkitpro に一気に展開
        sudo tar -xzf devkitpro-3ds-complete.tar.gz -C /
        
    # 3. 展開したSDKを使って、ネットワーク通信0でコンパイルを実行！
    - name: Compile Homebrew
      run: |
        # 解凍した本物のSDKへのパスを完璧に指定
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
        
        # 3ds.h や libctru が最初から含まれているため、そのまま make が一発で走る
        make
          
    # 4. 成果物（.3dsx または .cia）を保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
