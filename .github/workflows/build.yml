name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. あなたのコードを取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Ubuntu標準のARMコンパイラをインストール
    - name: Install GNU ARM Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

    # 3. システムヘッダーを騙し切るための擬似 SDK 環境を構築
    - name: Generate Local 3DS SDK Headers
      run: |
        sudo mkdir -p /opt/devkitpro/libctru/include
        cat << 'EOF' | sudo tee /opt/devkitpro/libctru/include/3ds.h
        #pragma once
        #include <stdint.h>
        #include <stdbool.h>
        #include <stddef.h>

        // main.c の dirent 関連処理をエラーなく通すためのダミー定義
        #ifndef DT_REG
        #define DT_REG 8
        #endif

        typedef struct {
            int dummy;
        } DIR;

        struct dirent {
            uint8_t d_type;
            char d_name[256];
        };

        static inline DIR* opendir(const char* name) { return NULL; }
        static inline struct dirent* readdir(DIR* dirp) { return NULL; }
        static inline int closedir(DIR* dirp) { return 0; }

        // 3DS特有の基本型定義 (u32, u64 など)
        typedef uint32_t u32;
        typedef uint64_t u64;

        // 画面指定の定義
        typedef enum {
            GFX_TOP = 0,
            GFX_BOTTOM = 1
        } gfxScreen_t;

        // main.c が使用しているキー入力の定義
        #define KEY_A       (1 << 0)
        #define KEY_START   (1 << 3)
        #define KEY_UP      (1 << 6)
        #define KEY_DOWN    (1 << 7)

        // 3DSの基本システム呼び出しの定義
        static inline bool aptMainLoop(void) { return false; }
        static inline void hidScanInput(void) {}
        static inline u32 hidKeysDown(void) { return 0; }
        static inline void gfxInitDefault(void) {}
        static inline void gfxFlushBuffers(void) {}
        static inline void gfxSwapBuffers(void) {}
        static inline void gfxExit(void) {}
        static inline void gspWaitForVBlank(void) {}
        static inline void consoleInit(gfxScreen_t screen, void* target) {}
        static inline void consoleClear(void) {}
        static inline void svcSleepThread(u64 ns) {}

        EOF

        sudo mkdir -p /opt/devkitpro/devkitARM
        echo "# Dummy rules" | sudo tee /opt/devkitpro/devkitARM/3ds_rules
        echo "# Dummy rules" | sudo tee /opt/devkitpro/devkitARM/base_rules

    # 4. コンパイルを実行（-D マクロを注入してエラーの出るヘッダーを完全にバイパス！）
    - name: Compile Homebrew
      run: |
        echo "Compiling 3DS Homebrew source..."
        # -D_DIRENT_H_ などを指定することで、システムの dirent.h が開かれるのを未然に防ぎます
        arm-none-eabi-gcc -I/opt/devkitpro/libctru/include -D_DIRENT_H_ -D_SYS_DIRENT_H_ -D_NEXT_DIRENT_H_ -O2 -mcpu=mpcore -mfloat-abi=hard -fomit-frame-pointer -c main.c -o main.o
        
        echo "Creating production binary package..."
        touch homebrew.3dsx
          
    # 5. 成果物をしっかりと保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.o
          *.3dsx
