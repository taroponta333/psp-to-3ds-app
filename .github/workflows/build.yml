name: 3DS Homebrew Ultimate Real Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile Real Homebrew
      run: |
        # パス設定（devkitProの推奨設定を網羅）
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        export PATH=$DEVKITARM/bin:$DEVKITPRO/tools/bin:$PATH
        
        # dkp-pacman の代わりに、公式のインストール用コマンドを直接叩く
        /opt/devkitpro/pacman/bin/pacman -Sy --noconfirm 3ds-dev
        
        # ビルド実行
        make clean
        make

    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
