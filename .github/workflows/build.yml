name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. あなたのコード（main.c, Makefile）を取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. devkitPro公式の「ツール導入用お助けスクリプト」を直接引っ張ってくる
    - name: Install devkitARM via official script
      run: |
        # 公式のリポジトリ設定スクリプトをダウンロードして実行
        wget https://apt.devkitpro.org/install-devkitpro.sh
        sudo chmod +x install-devkitpro.sh
        sudo ./install-devkitpro.sh
        
        # 3DS開発に必要な最小限のパッケージだけを直接インストール（余計な通信をカット）
        sudo apt-get update
        sudo apt-get install -y devkitarm-rules 3ds-dev

    # 3. パスを完璧に通してコンパイルを実行！
    - name: Compile Homebrew
      run: |
        export DEVKITPRO=/opt/devkitpro
        export DEVKITARM=$DEVKITPRO/devkitARM
        make
          
    # 4. 出来上がった成果物（.3dsx）を保存してダウンロード可能にする
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
