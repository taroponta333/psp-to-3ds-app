name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 3DS開発用ツールが最初から全部入っている全部入りイメージ(3ds-dev)を使用
    - name: Run build in devkitpro container
      uses: addnab/docker-run-action@v3
      with:
        image: devkitpro/devkitarm:3ds-dev  # <-- ここを :3ds-dev に変更！
        options: -v ${{ github.workspace }}:/workspace
        run: |
          # サーバーからのダウンロードが不要になったので、この行は消すか無効化します
          # dkp-pacman -S --noconfirm 3ds-dev
          
          cd /workspace
          make
          
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
