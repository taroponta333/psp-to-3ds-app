name: 3DS Homebrew Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. あなたのコード（main.c や Makefile）を取得
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 【ここを修正！】devkitPro公式の正しいアクション名に修正
    - name: Set up devkitPRO ARM (3DS)
      uses: devkitpro/setup-devkitpro@v1

    # 3. コンパイルを実行
    - name: Compile Homebrew
      run: |
        make
          
    # 4. 出来上がった成果物（.3dsx）を保存
    - name: Upload compiled binary
      uses: actions/upload-artifact@v4
      with:
        name: 3ds-homebrew-file
        path: |
          *.3dsx
          *.cia
